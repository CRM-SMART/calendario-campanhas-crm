
<style>
*{box-sizing:border-box;margin:0;padding:0}
.cal-wrap{padding:1rem 0}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.75rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-header div{text-align:center;font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 5px 3px;min-height:120px;cursor:pointer;transition:border-color .15s;position:relative;display:flex;flex-direction:column}
.day-cell:hover{border-color:var(--color-border-secondary)}
.day-cell.today{border:1.5px solid #1D9E75}
.day-cell.other-month{background:var(--color-background-tertiary);opacity:.45}
.day-num{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px;flex-shrink:0}
.events-area{flex:1;overflow:hidden}
.event-chip{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;display:flex;align-items:center;gap:3px;overflow:hidden;transition:opacity .15s}
.event-chip.dimmed{opacity:.15}
.chip-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.chip-ch{font-size:9px;opacity:.65;white-space:nowrap;flex-shrink:0}
.chip-del{display:none;flex-shrink:0;font-size:9px;cursor:pointer;opacity:.7;margin-left:2px}
.event-chip:hover .chip-del{display:inline}
.campaigns-area{flex-shrink:0;margin-top:3px;display:flex;flex-direction:column;gap:2px}
.camp-bar{font-size:9px;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;cursor:default;position:relative;min-height:14px;line-height:14px}
.camp-bar .bar-del{display:none;position:absolute;right:3px;top:0;font-size:9px;cursor:pointer;opacity:.8;line-height:14px}
.camp-bar:hover .bar-del{display:inline}
.camp-bar.start{border-radius:6px 0 0 6px}
.camp-bar.end{border-radius:0 6px 6px 0}
.camp-bar.solo{border-radius:6px}
.camp-bar.middle{border-radius:0}
.add-btn{background:none;border:none;color:var(--color-text-tertiary);font-size:15px;cursor:pointer;padding:0;line-height:1;position:absolute;top:4px;right:5px;opacity:0}
.day-cell:hover .add-btn{opacity:1}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-secondary);padding:1.25rem;width:350px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
.modal label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;margin-top:10px}
.modal input,.modal select{width:100%;font-size:13px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btns button{font-size:13px;padding:6px 14px}
.tab-row{display:flex;gap:0;margin-bottom:14px;border-bottom:.5px solid var(--color-border-tertiary)}
.tab{font-size:13px;padding:6px 12px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:2px}
.color-swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.selected{border-color:var(--color-text-primary)}
.channel-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--color-border-tertiary)}
.channel-dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.theme-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.theme-tag{font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;border:.5px solid transparent}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;margin-bottom:.75rem;padding:9px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:.5px solid var(--color-border-tertiary)}
.filter-bar label{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.filter-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:110px}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.fchip{font-size:11px;padding:3px 9px;border-radius:10px;cursor:pointer;border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .1s;white-space:nowrap}
.fchip.active-all{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.filter-divider{width:.5px;background:var(--color-border-tertiary);align-self:stretch;flex-shrink:0}
.active-filters-row{font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;min-height:14px}
.camp-list-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--color-border-tertiary)}
.camp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>

<div class="cal-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
    <button id="prev" style="background:none;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;cursor:pointer;font-size:13px;color:var(--color-text-primary)">&#8249;</button>
    <h2 id="month-label" style="font-size:15px;font-weight:500;color:var(--color-text-primary)"></h2>
    <button id="next" style="background:none;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;cursor:pointer;font-size:13px;color:var(--color-text-primary)">&#8250;</button>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>Canal</label>
      <div id="filter-channels" class="filter-chips"></div>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Tema</label>
      <div id="filter-themes" class="filter-chips"></div>
    </div>
  </div>
  <div class="active-filters-row" id="active-filters-row"></div>
  <div id="legend" class="legend"></div>

  <div class="cal-header">
    <div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div><div>DOM</div>
  </div>
  <div id="cal-grid" class="cal-grid"></div>
</div>

<div id="modal-bg" class="modal-bg" style="display:none">
  <div class="modal">
    <div class="tab-row">
      <div class="tab active" id="tab-event" onclick="switchTab('event')">Disparo</div>
      <div class="tab" id="tab-campaign" onclick="switchTab('campaign')">Campanha</div>
      <div class="tab" id="tab-channels" onclick="switchTab('channels')">Canais</div>
    </div>

    <!-- DISPARO -->
    <div id="pane-event">
      <h3 id="modal-title">Adicionar disparo</h3>
      <label>Tema</label>
      <div id="theme-suggestions" class="theme-tags"></div>
      <input id="ev-name" type="text" placeholder="Ex: Promoção, Alerta, Feriado..." />
      <label>Horário</label>
      <input id="ev-time" type="time" value="09:00" />
      <label>Canal</label>
      <select id="ev-channel"></select>
      <label>Cor <span id="color-hint" style="font-size:11px;color:var(--color-text-tertiary)"></span></label>
      <div id="color-grid" class="color-grid"></div>
      <div class="modal-btns">
        <button id="modal-cancel">Cancelar</button>
        <button id="modal-save">Salvar</button>
      </div>
    </div>

    <!-- CAMPANHA -->
    <div id="pane-campaign" style="display:none">
      <h3>Campanha / Período</h3>
      <div id="camp-list" style="margin-bottom:12px"></div>
      <label>Nome da campanha</label>
      <input id="camp-name" type="text" placeholder="Ex: Black Friday, Verão 2026..." style="margin-bottom:8px"/>
      <label>Data início</label>
      <input id="camp-start" type="date" style="margin-bottom:8px"/>
      <label>Data fim</label>
      <input id="camp-end" type="date" style="margin-bottom:8px"/>
      <label>Cor</label>
      <div id="camp-color-grid" class="color-grid" style="margin-bottom:4px"></div>
      <div class="modal-btns">
        <button id="camp-cancel">Fechar</button>
        <button id="camp-add">Adicionar campanha</button>
      </div>
    </div>

    <!-- CANAIS -->
    <div id="pane-channels" style="display:none">
      <h3>Gerenciar canais</h3>
      <div id="channel-list" style="margin-bottom:12px"></div>
      <label>Novo canal</label>
      <input id="new-ch-name" type="text" placeholder="Nome do canal..." style="margin-bottom:8px"/>
      <label>Cor do canal</label>
      <div id="ch-color-grid" class="color-grid" style="margin-bottom:12px"></div>
      <div class="modal-btns">
        <button id="ch-cancel">Fechar</button>
        <button id="ch-add">Adicionar</button>
      </div>
    </div>
  </div>
</div>

<script>
const PALETTE=[
  {id:'purple',label:'Roxo',bg:'#EEEDFE',text:'#3C3489',dot:'#7F77DD'},
  {id:'teal',label:'Verde',bg:'#E1F5EE',text:'#0F6E56',dot:'#1D9E75'},
  {id:'blue',label:'Azul',bg:'#E6F1FB',text:'#185FA5',dot:'#378ADD'},
  {id:'amber',label:'Laranja',bg:'#FAEEDA',text:'#854F0B',dot:'#BA7517'},
  {id:'coral',label:'Coral',bg:'#FAECE7',text:'#993C1D',dot:'#D85A30'},
  {id:'pink',label:'Rosa',bg:'#FBEAF0',text:'#993556',dot:'#D4537E'},
  {id:'green',label:'Verde',bg:'#EAF3DE',text:'#3B6D11',dot:'#639922'},
  {id:'red',label:'Vermelho',bg:'#FCEBEB',text:'#A32D2D',dot:'#E24B4A'},
  {id:'gray',label:'Cinza',bg:'#F1EFE8',text:'#5F5E5A',dot:'#888780'},
  {id:'sky',label:'Céu',bg:'#E0F2FE',text:'#0C5A87',dot:'#38B2D8'},
  {id:'lime',label:'Lima',bg:'#F0FBE4',text:'#3A6A0A',dot:'#7DC52E'},
  {id:'violet',label:'Violeta',bg:'#F3EEFF',text:'#5B3AA8',dot:'#9B6EF3'},
  {id:'rose',label:'Rosê',bg:'#FFF0F3',text:'#9A1B3D',dot:'#F472A0'},
  {id:'gold',label:'Dourado',bg:'#FEF8E3',text:'#8A6500',dot:'#E6B800'},
  {id:'indigo',label:'Índigo',bg:'#EEF0FF',text:'#2D3A9A',dot:'#6674E5'},
  {id:'brown',label:'Marrom',bg:'#F5EDE6',text:'#6B3A20',dot:'#B06A3A'},
];
const DEFAULT_CHANNELS=[
  {id:'ch_apppush',name:'App Push',color:'purple'},
  {id:'ch_webpush',name:'Web Push',color:'blue'},
  {id:'ch_firebase',name:'Firebase',color:'amber'},
  {id:'ch_pushnews',name:'Pushnews',color:'coral'},
  {id:'ch_email',name:'E-mail',color:'teal'},
  {id:'ch_whatsapp',name:'WhatsApp',color:'green'},
];
function gc(id){return PALETTE.find(c=>c.id===id)||PALETTE[0]}
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let today=new Date();
let cur={y:today.getFullYear(),m:today.getMonth()};
let events={},channels=[],campaigns=[];
let openCell=null,selColor='purple',selChColor='teal',selCampColor='coral';
let filterCh=new Set(),filterTh=new Set();

try{
  events=JSON.parse(localStorage.getItem('cal5_ev')||'{}');
  const sc=localStorage.getItem('cal5_ch');
  channels=sc?JSON.parse(sc):JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
  campaigns=JSON.parse(localStorage.getItem('cal5_camp')||'[]');
}catch(e){events={};channels=JSON.parse(JSON.stringify(DEFAULT_CHANNELS));campaigns=[];}
if(!channels.length) channels=JSON.parse(JSON.stringify(DEFAULT_CHANNELS));

function saveAll(){
  try{
    localStorage.setItem('cal5_ev',JSON.stringify(events));
    localStorage.setItem('cal5_ch',JSON.stringify(channels));
    localStorage.setItem('cal5_camp',JSON.stringify(campaigns));
  }catch(e){}
}

// date helpers
function dkey(y,m,d){return y+'-'+(m+1)+'-'+d}
function dateFromKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}
function toKey(dt){return dt.getFullYear()+'-'+(dt.getMonth()+1)+'-'+dt.getDate()}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function datesBetween(s,e){const r=[];let c=new Date(s);while(c<=e){r.push(toKey(c));c.setDate(c.getDate()+1);}return r}

// build color swatches
function buildGrid(containerId,selId,cb){
  const g=document.getElementById(containerId);
  g.innerHTML='';
  PALETTE.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(c.id===selId?' selected':'');
    sw.style.background=c.dot;sw.title=c.label;
    sw.addEventListener('click',()=>{g.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');cb(c.id);});
    g.appendChild(sw);
  });
}

buildGrid('ch-color-grid',selChColor,id=>{selChColor=id;});
buildGrid('camp-color-grid',selCampColor,id=>{selCampColor=id;});

function refreshChSel(){
  const sel=document.getElementById('ev-channel');
  const prev=sel.value;
  sel.innerHTML='<option value="">— Nenhum —</option>';
  channels.forEach(ch=>{const o=document.createElement('option');o.value=ch.id;o.textContent=ch.name;sel.appendChild(o);});
  sel.value=channels.find(c=>c.id===prev)?prev:'';
  updChColor();
}
function updChColor(){
  const ch=channels.find(c=>c.id===document.getElementById('ev-channel').value);
  document.getElementById('color-hint').textContent=ch?'(definida pelo canal)':'';
  if(ch) selColor=ch.color;
  buildGrid('color-grid',selColor,id=>{selColor=id;});
}
document.getElementById('ev-channel').addEventListener('change',updChColor);

// filter
function allThemes(){const s=new Set();Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name)s.add(e.name)}));return[...s].sort();}
function isActive(ev){
  const co=filterCh.size===0||(ev.channelId&&filterCh.has(ev.channelId));
  const to=filterTh.size===0||filterTh.has(ev.name);
  return co&&to;
}
function renderFilterBar(){
  const fc=document.getElementById('filter-channels');
  fc.innerHTML='';
  const a=document.createElement('div');
  a.className='fchip'+(filterCh.size===0?' active-all':'');
  a.textContent='Todos';
  a.addEventListener('click',()=>{filterCh.clear();renderFilterBar();renderCal();});
  fc.appendChild(a);
  channels.forEach(ch=>{
    const c=gc(ch.color);const isOn=filterCh.has(ch.id);
    const chip=document.createElement('div');
    chip.className='fchip'+(isOn?' active':'');
    if(isOn){chip.style.background=c.bg;chip.style.color=c.text;chip.style.borderColor=c.dot;}
    chip.innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c.dot};margin-right:4px;vertical-align:middle"></span>${ch.name}`;
    chip.addEventListener('click',()=>{isOn?filterCh.delete(ch.id):filterCh.add(ch.id);renderFilterBar();renderCal();});
    fc.appendChild(chip);
  });
  const ft=document.getElementById('filter-themes');
  ft.innerHTML='';
  const themes=allThemes();
  if(!themes.length){ft.innerHTML='<span style="font-size:11px;color:var(--color-text-tertiary)">Nenhum tema ainda</span>';
  } else {
    const at=document.createElement('div');
    at.className='fchip'+(filterTh.size===0?' active-all':'');
    at.textContent='Todos';
    at.addEventListener('click',()=>{filterTh.clear();renderFilterBar();renderCal();});
    ft.appendChild(at);
    themes.forEach(name=>{
      let color='gray';Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name===name)color=e.color;}));
      const c=gc(color);const isOn=filterTh.has(name);
      const chip=document.createElement('div');chip.className='fchip'+(isOn?' active':'');
      if(isOn){chip.style.background=c.bg;chip.style.color=c.text;chip.style.borderColor=c.dot;}
      chip.textContent=name;
      chip.addEventListener('click',()=>{isOn?filterTh.delete(name):filterTh.add(name);renderFilterBar();renderCal();});
      ft.appendChild(chip);
    });
  }
  const parts=[];
  if(filterCh.size>0) parts.push('Canal: '+[...filterCh].map(id=>channels.find(c=>c.id===id)?.name||id).join(', '));
  if(filterTh.size>0) parts.push('Tema: '+[...filterTh].join(', '));
  document.getElementById('active-filters-row').textContent=parts.length?'Filtros ativos — '+parts.join(' · '):'';
}

// campaign list in modal
function renderCampList(){
  const el=document.getElementById('camp-list');
  el.innerHTML='';
  if(!campaigns.length){el.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary)">Nenhuma campanha.</div>';return;}
  campaigns.forEach(cp=>{
    const c=gc(cp.color);
    const row=document.createElement('div');
    row.className='camp-list-row';
    row.innerHTML=`<div class="camp-dot" style="background:${c.dot}"></div><span style="flex:1;font-size:13px;color:var(--color-text-primary)">${cp.name}</span><span style="font-size:11px;color:var(--color-text-tertiary);margin-right:8px">${cp.start} → ${cp.end}</span><button style="background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:13px" data-id="${cp.id}">✕</button>`;
    row.querySelector('button').addEventListener('click',()=>{campaigns=campaigns.filter(x=>x.id!==cp.id);saveAll();renderCampList();renderCal();});
    el.appendChild(row);
  });
}

document.getElementById('camp-add').addEventListener('click',()=>{
  const name=document.getElementById('camp-name').value.trim();
  const start=document.getElementById('camp-start').value;
  const end=document.getElementById('camp-end').value;
  if(!name||!start||!end||start>end)return;
  campaigns.push({id:'cp_'+Date.now(),name,start,end,color:selCampColor});
  document.getElementById('camp-name').value='';
  saveAll();renderCampList();renderCal();
});

// channels
function renderChList(){
  const el=document.getElementById('channel-list');el.innerHTML='';
  channels.forEach(ch=>{
    const c=gc(ch.color);const row=document.createElement('div');row.className='channel-row';
    row.innerHTML=`<div class="channel-dot-sm" style="background:${c.dot}"></div><span style="flex:1;font-size:13px;color:var(--color-text-primary)">${ch.name}</span><button style="background:none;border:none;cursor:pointer;color:var(--color-text-tertiary)" data-id="${ch.id}">✕</button>`;
    row.querySelector('button').addEventListener('click',()=>{channels=channels.filter(x=>x.id!==ch.id);saveAll();renderChList();refreshChSel();renderCal();});
    el.appendChild(row);
  });
}
document.getElementById('ch-add').addEventListener('click',()=>{
  const name=document.getElementById('new-ch-name').value.trim();if(!name)return;
  channels.push({id:'ch_'+Date.now(),name,color:selChColor});
  document.getElementById('new-ch-name').value='';
  saveAll();renderChList();refreshChSel();renderFilterBar();renderCal();
});

function switchTab(t){
  ['event','campaign','channels'].forEach(p=>{
    document.getElementById('pane-'+p).style.display=p===t?'':'none';
    document.getElementById('tab-'+(p==='event'?'event':p)).className='tab'+(p===t?' active':'');
  });
  if(t==='campaign')renderCampList();
  if(t==='channels')renderChList();
}
// fix tab ids
document.getElementById('tab-campaign').id='tab-campaign';

function usedThemes(){const t={};Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name)t[e.name]=e.color}));return t;}

function renderLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  channels.forEach(ch=>{const c=gc(ch.color);el.innerHTML+=`<div class="legend-item"><div class="ldot" style="background:${c.dot}"></div><span>${ch.name}</span></div>`;});
  if(campaigns.length){
    el.innerHTML+=`<span style="font-size:11px;color:var(--color-text-tertiary);margin-left:4px">|</span>`;
    campaigns.forEach(cp=>{const c=gc(cp.color);el.innerHTML+=`<div class="legend-item"><div class="ldot" style="background:${c.dot};border-radius:2px"></div><span>${cp.name}</span></div>`;});
  }
}

// get campaigns active on a specific date key
function campsForDay(k){
  const d=dateFromKey(k);
  return campaigns.filter(cp=>{
    const s=parseDate(cp.start),e=parseDate(cp.end);
    return d>=s&&d<=e;
  });
}

function renderCal(){
  const grid=document.getElementById('cal-grid');
  document.getElementById('month-label').textContent=MONTHS[cur.m]+' '+cur.y;
  grid.innerHTML='';
  const first=new Date(cur.y,cur.m,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const total=new Date(cur.y,cur.m+1,0).getDate();
  const prevTotal=new Date(cur.y,cur.m,0).getDate();
  const cells=[];
  for(let i=dow-1;i>=0;i--) cells.push({d:prevTotal-i,cur:false});
  for(let d=1;d<=total;d++) cells.push({d,cur:true});
  let nxt=1;while(cells.length%7!==0) cells.push({d:nxt++,cur:false});

  cells.forEach(({d,cur:isCur},idx)=>{
    const cell=document.createElement('div');
    cell.className='day-cell'+(isCur?'':' other-month');
    const isToday=isCur&&d===today.getDate()&&cur.m===today.getMonth()&&cur.y===today.getFullYear();
    if(isToday) cell.classList.add('today');
    const k=isCur?dkey(cur.y,cur.m,d):'';

    const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=d;cell.appendChild(numEl);

    const evArea=document.createElement('div');evArea.className='events-area';
    if(isCur&&events[k]){
      events[k].forEach((ev,i)=>{
        const c=gc(ev.color);const ch=channels.find(x=>x.id===ev.channelId);
        const dimmed=(filterCh.size>0||filterTh.size>0)&&!isActive(ev);
        const chip=document.createElement('div');chip.className='event-chip'+(dimmed?' dimmed':'');
        chip.dataset.k=k;chip.dataset.idx=i;chip.style.background=c.bg;chip.style.color=c.text;
        chip.innerHTML=`<span class="chip-text">${ev.time}·${ev.name}</span>${ch?`<span class="chip-ch">${ch.name}</span>`:''}<span class="chip-del">✕</span>`;
        chip.querySelector('.chip-del').addEventListener('click',e=>{e.stopPropagation();events[k].splice(i,1);if(!events[k].length)delete events[k];saveAll();renderCal();renderFilterBar();});
        evArea.appendChild(chip);
      });
    }
    cell.appendChild(evArea);

    // campaign bars at bottom
    if(isCur){
      const campArea=document.createElement('div');campArea.className='campaigns-area';
      const activeCamps=campsForDay(k);
      activeCamps.forEach(cp=>{
        const c=gc(cp.color);
        const s=parseDate(cp.start),e=parseDate(cp.end);
        const cellDate=dateFromKey(k);
        const isStart=cellDate.getTime()===s.getTime();
        const isEnd=cellDate.getTime()===e.getTime();
        const isSolo=isStart&&isEnd;
        const isMonStart=idx%7===0;
        const isMonEnd=idx%7===6;
        let cls='camp-bar ';
        if(isSolo) cls+='solo';
        else if(isStart||isMonStart) cls+=(isEnd||isMonEnd)?'solo':'start';
        else if(isEnd||isMonEnd) cls+='end';
        else cls+='middle';
        const bar=document.createElement('div');bar.className=cls;
        bar.style.background=c.dot;bar.style.color='#fff';
        const showText=isStart||isMonStart;
        bar.innerHTML=showText?`${cp.name}<span class="bar-del" data-id="${cp.id}">✕</span>`:'<span class="bar-del" data-id="'+cp.id+'">✕</span>';
        bar.querySelector('.bar-del').addEventListener('click',e=>{e.stopPropagation();campaigns=campaigns.filter(x=>x.id!==cp.id);saveAll();renderCal();});
        campArea.appendChild(bar);
      });
      cell.appendChild(campArea);
    }

    if(isCur){
      const btn=document.createElement('button');btn.className='add-btn';btn.textContent='+';
      btn.addEventListener('click',e=>{e.stopPropagation();openModal(k,d)});
      cell.appendChild(btn);
      cell.addEventListener('click',()=>openModal(k,d));
    }
    grid.appendChild(cell);
  });
  renderLegend();renderFilterBar();
}

function openModal(k,d){
  openCell=k;switchTab('event');
  document.getElementById('modal-title').textContent='Disparo — dia '+d;
  document.getElementById('ev-name').value='';document.getElementById('ev-time').value='09:00';
  selColor='purple';refreshChSel();
  const sug=document.getElementById('theme-suggestions');sug.innerHTML='';
  Object.entries(usedThemes()).forEach(([name,color])=>{
    const c=gc(color);const tag=document.createElement('div');tag.className='theme-tag';tag.textContent=name;
    tag.style.background=c.bg;tag.style.color=c.text;tag.style.borderColor=c.dot;
    tag.addEventListener('click',()=>{document.getElementById('ev-name').value=name;selColor=color;buildGrid('color-grid',selColor,id=>{selColor=id;});});
    sug.appendChild(tag);
  });
  document.getElementById('modal-bg').style.display='flex';
  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}

document.getElementById('modal-save').addEventListener('click',()=>{
  const name=document.getElementById('ev-name').value.trim();
  const time=document.getElementById('ev-time').value;
  const channelId=document.getElementById('ev-channel').value||null;
  if(!name)return;
  if(!events[openCell])events[openCell]=[];
  events[openCell].push({name,time,color:selColor,channelId});
  events[openCell].sort((a,b)=>a.time.localeCompare(b.time));
  saveAll();renderCal();renderFilterBar();
  document.getElementById('modal-bg').style.display='none';
});
document.getElementById('modal-cancel').addEventListener('click',()=>{document.getElementById('modal-bg').style.display='none'});
document.getElementById('camp-cancel').addEventListener('click',()=>{document.getElementById('modal-bg').style.display='none'});
document.getElementById('ch-cancel').addEventListener('click',()=>{document.getElementById('modal-bg').style.display='none'});
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modal-bg').style.display='none'});
document.getElementById('ev-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-save').click()});
document.getElementById('new-ch-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ch-add').click()});
document.getElementById('prev').addEventListener('click',()=>{cur.m--;if(cur.m<0){cur.m=11;cur.y--}renderCal()});
document.getElementById('next').addEventListener('click',()=>{cur.m++;if(cur.m>11){cur.m=0;cur.y++}renderCal()});

// set default dates to current month
const pad=n=>String(n).padStart(2,'0');
document.getElementById('camp-start').value=`${cur.y}-${pad(cur.m+1)}-01`;
document.getElementById('camp-end').value=`${cur.y}-${pad(cur.m+1)}-${new Date(cur.y,cur.m+1,0).getDate()}`;

renderCal();
</script>
