<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calendário CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9f9f7;color:#1a1a1a;padding:16px}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#aaa}

.cal-wrap{max-width:1400px;margin:0 auto;padding:1rem 0}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.nav-row h2{font-size:16px;font-weight:600;color:#1a1a1a}
.nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:5px 14px;font-size:14px;color:#1a1a1a}
.nav-btn:hover{background:#f0f0ee}
.sync-indicator{font-size:11px;color:#aaa;display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-bottom:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.ok{background:#1D9E75}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:.75rem;padding:10px 14px;background:#f0f0ee;border-radius:10px;border:1px solid #e0e0dc}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.filter-bar label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.fchip{font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .1s;white-space:nowrap}
.fchip:hover{border-color:#bbb}
.fchip.active-all{background:#1a1a1a;color:#fff;border-color:transparent}
.fchip.active{border-color:transparent}
.filter-divider{width:1px;background:#ddd;align-self:stretch;flex-shrink:0;margin:0 2px}
.active-filters-row{font-size:11px;color:#aaa;margin-bottom:6px;min-height:14px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.75rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ldot-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── CALENDAR ── */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-header div{text-align:center;font-size:11px;font-weight:600;color:#888;padding:4px 0;letter-spacing:.05em}

/* Each week row is its own sub-grid so all 7 cells share the same height */
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}

/* Cell: flex column, campaigns pinned to bottom */
.day-cell{
  background:#fff;
  border:1px solid #e8e8e5;
  border-radius:8px;
  padding:6px 5px 5px;
  cursor:pointer;
  transition:border-color .15s;
  position:relative;
  display:flex;
  flex-direction:column;
  min-height:110px;
}
.day-cell:hover{border-color:#ccc}
.day-cell.today{border:2px solid #1D9E75}
.day-cell.other-month{background:#f6f6f4;opacity:.45}
.day-num{font-size:12px;font-weight:500;color:#888;margin-bottom:4px;flex-shrink:0}
.day-cell.today .day-num{color:#1D9E75;font-weight:700}

/* Events grow, push campaigns to bottom */
.events-area{flex:1;display:flex;flex-direction:column;gap:2px}

.event-chip{font-size:10px;padding:2px 5px;border-radius:4px;display:flex;align-items:center;gap:3px;overflow:hidden;transition:opacity .15s;cursor:pointer;flex-shrink:0}
.event-chip:hover{filter:brightness(.96)}
.event-chip.dimmed{opacity:.12}
.chip-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;font-weight:500}
.chip-meta{font-size:9px;opacity:.65;white-space:nowrap;flex-shrink:0;display:flex;gap:3px;align-items:center}
.chip-aud-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.chip-del{display:none;flex-shrink:0;font-size:9px;cursor:pointer;opacity:.7;margin-left:2px;line-height:1}
.event-chip:hover .chip-del{display:inline}

/* Campaigns always at the bottom of each cell */
.campaigns-area{flex-shrink:0;margin-top:5px;display:flex;flex-direction:column;gap:2px}

.camp-bar{font-size:9px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;cursor:pointer;position:relative;min-height:16px;line-height:16px;color:#fff}
.camp-bar:hover{filter:brightness(.9)}
.camp-bar .bar-del{display:none;position:absolute;right:3px;top:0;font-size:9px;cursor:pointer;opacity:.9;line-height:16px}
.camp-bar:hover .bar-del{display:inline}
.camp-bar.start{border-radius:6px 0 0 6px}
.camp-bar.end{border-radius:0 6px 6px 0}
.camp-bar.solo{border-radius:6px}
.camp-bar.middle{border-radius:0}
/* Transparent placeholder so cells without campaign stay aligned */
.camp-bar.placeholder{background:transparent !important;pointer-events:none;visibility:hidden}

.add-btn{background:none;border:none;color:#bbb;font-size:15px;cursor:pointer;padding:0;line-height:1;position:absolute;top:5px;right:5px;opacity:0}
.day-cell:hover .add-btn{opacity:1}
.add-btn:hover{color:#888}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;border:1px solid #e0e0dc;padding:1.25rem;width:360px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:4px;margin-top:10px;font-weight:500}
.modal input,.modal select{width:100%}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btns button{font-size:13px;padding:7px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a}
.modal-btns button:last-child{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.modal-btns button:hover{opacity:.85}
.tab-row{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid #eee}
.tab{font-size:12px;padding:7px 10px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap;user-select:none}
.tab:hover{color:#555}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:2px}
.color-swatch{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.selected{border-color:#1a1a1a}
.list-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0ee}
.dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.theme-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.theme-tag{font-size:11px;padding:3px 9px;border-radius:10px;cursor:pointer;border:1px solid transparent;font-weight:500}
.camp-list-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f0f0ee}
.sep{width:1px;background:#ddd;align-self:stretch;flex-shrink:0}
.aud-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.aud-pill{font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.time-selects{display:flex;gap:6px}
.time-selects select{flex:1}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(249,249,247,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
.loading-overlay p{font-size:14px;color:#888}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}
.edit-badge{font-size:10px;color:#666;margin-bottom:8px;padding:4px 8px;background:#f5f5f3;border-radius:6px;display:inline-block}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <p>Carregando calendário...</p>
</div>

<div class="cal-wrap">
  <div class="nav-row">
    <button class="nav-btn" id="prev">&#8249;</button>
    <h2 id="month-label"></h2>
    <button class="nav-btn" id="next">&#8250;</button>
  </div>
  <div class="sync-indicator">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Conectando...</span>
  </div>
  <div class="filter-bar">
    <div class="filter-group"><label>Canal</label><div id="filter-channels" class="filter-chips"></div></div>
    <div class="filter-divider"></div>
    <div class="filter-group"><label>Público</label><div id="filter-audiences" class="filter-chips"></div></div>
    <div class="filter-divider"></div>
    <div class="filter-group"><label>Tema</label><div id="filter-themes" class="filter-chips"></div></div>
  </div>
  <div class="active-filters-row" id="active-filters-row"></div>
  <div id="legend" class="legend"></div>
  <div class="cal-header">
    <div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div><div>DOM</div>
  </div>
  <div id="cal-body"></div>
</div>

<div id="modal-bg" class="modal-bg" style="display:none">
  <div class="modal">
    <div class="tab-row">
      <div class="tab active" id="tab-event" data-tab="event">Disparo</div>
      <div class="tab" id="tab-campaign" data-tab="campaign">Campanha</div>
      <div class="tab" id="tab-channels" data-tab="channels">Canais</div>
      <div class="tab" id="tab-audiences" data-tab="audiences">Públicos</div>
    </div>
    <div id="pane-event">
      <h3 id="modal-title">Adicionar disparo</h3>
      <div id="edit-badge" class="edit-badge" style="display:none">✏️ Editando disparo existente</div>
      <label>Tema</label>
      <div id="theme-suggestions" class="theme-tags"></div>
      <input id="ev-name" type="text" placeholder="Ex: Promoção, Alerta, Feriado..."/>
      <label>Horário</label>
      <div class="time-selects">
        <select id="ev-hour"></select>
        <select id="ev-min"><option value="00">:00</option><option value="30">:30</option></select>
      </div>
      <label>Canal</label>
      <select id="ev-channel"></select>
      <label>Público</label>
      <div id="ev-audience-pills" class="aud-pills" style="margin-bottom:4px"></div>
      <label>Cor <span id="color-hint" style="font-size:11px;color:#aaa"></span></label>
      <div id="color-grid" class="color-grid" style="margin-top:6px"></div>
      <div class="modal-btns">
        <button id="modal-cancel">Cancelar</button>
        <button id="modal-save">Salvar</button>
      </div>
    </div>
    <div id="pane-campaign" style="display:none">
      <h3>Campanha / Período</h3>
      <div id="edit-camp-badge" class="edit-badge" style="display:none">✏️ Editando campanha existente</div>
      <div id="camp-list" style="margin-bottom:12px"></div>
      <label>Nome da campanha</label>
      <input id="camp-name" type="text" placeholder="Ex: Black Friday, Verão 2026..."/>
      <label>Data início</label><input id="camp-start" type="date"/>
      <label>Data fim</label><input id="camp-end" type="date"/>
      <label>Cor</label>
      <div id="camp-color-grid" class="color-grid" style="margin-top:6px;margin-bottom:4px"></div>
      <div class="modal-btns">
        <button id="camp-cancel">Fechar</button>
        <button id="camp-add">Adicionar campanha</button>
      </div>
    </div>
    <div id="pane-channels" style="display:none">
      <h3>Gerenciar canais</h3>
      <div id="channel-list" style="margin-bottom:12px"></div>
      <label>Novo canal</label>
      <input id="new-ch-name" type="text" placeholder="Nome do canal..."/>
      <label>Cor do canal</label>
      <div id="ch-color-grid" class="color-grid" style="margin-top:6px;margin-bottom:12px"></div>
      <div class="modal-btns"><button id="ch-cancel">Fechar</button><button id="ch-add">Adicionar</button></div>
    </div>
    <div id="pane-audiences" style="display:none">
      <h3>Gerenciar públicos</h3>
      <div id="audience-list" style="margin-bottom:12px"></div>
      <label>Novo público</label>
      <input id="new-aud-name" type="text" placeholder="Ex: VIP, Inativos 90d..."/>
      <label>Cor do público</label>
      <div id="aud-color-grid" class="color-grid" style="margin-top:6px;margin-bottom:12px"></div>
      <div class="modal-btns"><button id="aud-cancel">Fechar</button><button id="aud-add">Adicionar público</button></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyC7xA8-P1kAhf_6ItweNk9lxV64lautOSo",authDomain:"crm-calendario-f3b18.firebaseapp.com",projectId:"crm-calendario-f3b18",storageBucket:"crm-calendario-f3b18.firebasestorage.app",messagingSenderId:"1069676978590",appId:"1:1069676978590:web:c9a99be01b991df9f0b68f"};
const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);

const PALETTE=[
  {id:'purple',bg:'#EEEDFE',text:'#3C3489',dot:'#7F77DD'},
  {id:'teal',bg:'#E1F5EE',text:'#0F6E56',dot:'#1D9E75'},
  {id:'blue',bg:'#E6F1FB',text:'#185FA5',dot:'#378ADD'},
  {id:'amber',bg:'#FAEEDA',text:'#854F0B',dot:'#BA7517'},
  {id:'coral',bg:'#FAECE7',text:'#993C1D',dot:'#D85A30'},
  {id:'pink',bg:'#FBEAF0',text:'#993556',dot:'#D4537E'},
  {id:'green',bg:'#EAF3DE',text:'#3B6D11',dot:'#639922'},
  {id:'red',bg:'#FCEBEB',text:'#A32D2D',dot:'#E24B4A'},
  {id:'gray',bg:'#F1EFE8',text:'#5F5E5A',dot:'#888780'},
  {id:'sky',bg:'#E0F2FE',text:'#0C5A87',dot:'#38B2D8'},
  {id:'lime',bg:'#F0FBE4',text:'#3A6A0A',dot:'#7DC52E'},
  {id:'violet',bg:'#F3EEFF',text:'#5B3AA8',dot:'#9B6EF3'},
  {id:'rose',bg:'#FFF0F3',text:'#9A1B3D',dot:'#F472A0'},
  {id:'gold',bg:'#FEF8E3',text:'#8A6500',dot:'#E6B800'},
  {id:'indigo',bg:'#EEF0FF',text:'#2D3A9A',dot:'#6674E5'},
  {id:'brown',bg:'#F5EDE6',text:'#6B3A20',dot:'#B06A3A'},
];
const DEFAULT_CHANNELS=[{id:'ch_apppush',name:'App Push',color:'purple'},{id:'ch_webpush',name:'Web Push',color:'blue'},{id:'ch_firebase',name:'Firebase',color:'amber'},{id:'ch_pushnews',name:'Pushnews',color:'coral'},{id:'ch_email',name:'E-mail',color:'teal'},{id:'ch_whatsapp',name:'WhatsApp',color:'green'}];
const DEFAULT_AUDIENCES=[{id:'aud_todos',name:'Todos',color:'gray'},{id:'aud_ativos',name:'Ativos',color:'teal'},{id:'aud_queda',name:'Em queda',color:'amber'},{id:'aud_frios',name:'Frios',color:'blue'}];
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function gc(id){return PALETTE.find(c=>c.id===id)||PALETTE[0]}

let today=new Date(),cur={y:today.getFullYear(),m:today.getMonth()};
let events={},channels=[],campaigns=[],audiences=[];
let openCell=null,selColor='purple',selChColor='teal',selCampColor='coral',selAudColor='sky';
let selAudienceId='aud_todos';
let filterCh=new Set(),filterTh=new Set(),filterAud=new Set();
let isSaving=false,editEvKey=null,editEvIdx=null,editCampId=null;

// hours
const hourSel=document.getElementById('ev-hour');
for(let h=0;h<24;h++){const o=document.createElement('option');o.value=String(h).padStart(2,'0');o.textContent=String(h).padStart(2,'0')+'h';hourSel.appendChild(o);}
hourSel.value='09';

// tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

function switchTab(t){
  ['event','campaign','channels','audiences'].forEach(p=>{
    document.getElementById('pane-'+p).style.display=p===t?'':'none';
    const el=document.getElementById('tab-'+p);if(el)el.className='tab'+(p===t?' active':'');
  });
  if(t==='campaign')renderCampList();
  if(t==='channels')renderChList();
  if(t==='audiences')renderAudList();
}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label');
  if(s==='ok'){dot.className='sync-dot ok';lbl.textContent='Sincronizado';}
  else if(s==='syncing'){dot.className='sync-dot syncing';lbl.textContent='Salvando...';}
  else if(s==='error'){dot.className='sync-dot error';lbl.textContent='Erro de conexão';}
  else{dot.className='sync-dot';lbl.textContent='Conectando...';}
}

const calRef=doc(db,'calendario','data'),cfgRef=doc(db,'calendario','config');

async function loadFromFirebase(){
  try{
    const[calSnap,cfgSnap]=await Promise.all([getDoc(calRef),getDoc(cfgRef)]);
    if(calSnap.exists())events=calSnap.data().events||{};
    if(cfgSnap.exists()){channels=cfgSnap.data().channels||JSON.parse(JSON.stringify(DEFAULT_CHANNELS));campaigns=cfgSnap.data().campaigns||[];audiences=cfgSnap.data().audiences||JSON.parse(JSON.stringify(DEFAULT_AUDIENCES));}
    else{channels=JSON.parse(JSON.stringify(DEFAULT_CHANNELS));audiences=JSON.parse(JSON.stringify(DEFAULT_AUDIENCES));campaigns=[];await saveConfig();}
    setSyncStatus('ok');
  }catch(e){console.error(e);setSyncStatus('error');}
  document.getElementById('loading-overlay').style.display='none';
  renderCal();
}

function startListener(){
  onSnapshot(calRef,(snap)=>{if(snap.exists()&&!isSaving){events=snap.data().events||{};renderCal();setSyncStatus('ok');}});
  onSnapshot(cfgRef,(snap)=>{if(snap.exists()&&!isSaving){channels=snap.data().channels||DEFAULT_CHANNELS;campaigns=snap.data().campaigns||[];audiences=snap.data().audiences||DEFAULT_AUDIENCES;renderCal();setSyncStatus('ok');}});
}

async function saveEvents(){isSaving=true;setSyncStatus('syncing');try{await setDoc(calRef,{events});setSyncStatus('ok');}catch(e){setSyncStatus('error');}setTimeout(()=>{isSaving=false;},500);}
async function saveConfig(){isSaving=true;setSyncStatus('syncing');try{await setDoc(cfgRef,{channels,campaigns,audiences});setSyncStatus('ok');}catch(e){setSyncStatus('error');}setTimeout(()=>{isSaving=false;},500);}

function buildGrid(cid,selId,cb){
  const g=document.getElementById(cid);if(!g)return;g.innerHTML='';
  PALETTE.forEach(c=>{const sw=document.createElement('div');sw.className='color-swatch'+(c.id===selId?' selected':'');sw.style.background=c.dot;sw.title=c.id;sw.addEventListener('click',()=>{g.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');cb(c.id);});g.appendChild(sw);});
}
buildGrid('ch-color-grid',selChColor,id=>{selChColor=id;});
buildGrid('camp-color-grid',selCampColor,id=>{selCampColor=id;});
buildGrid('aud-color-grid',selAudColor,id=>{selAudColor=id;});

function refreshChSel(){
  const sel=document.getElementById('ev-channel'),prev=sel.value;
  sel.innerHTML='<option value="">— Nenhum —</option>';
  channels.forEach(ch=>{const o=document.createElement('option');o.value=ch.id;o.textContent=ch.name;sel.appendChild(o);});
  sel.value=channels.find(c=>c.id===prev)?prev:'';updChColor();
}
function updChColor(){
  const ch=channels.find(c=>c.id===document.getElementById('ev-channel').value);
  document.getElementById('color-hint').textContent=ch?'(definida pelo canal)':'';
  if(ch)selColor=ch.color;
  buildGrid('color-grid',selColor,id=>{selColor=id;});
}
document.getElementById('ev-channel').addEventListener('change',updChColor);

function refreshAudPills(){
  const container=document.getElementById('ev-audience-pills');container.innerHTML='';
  audiences.forEach(aud=>{
    const c=gc(aud.color),isOn=selAudienceId===aud.id;
    const pill=document.createElement('div');pill.className='aud-pill';pill.textContent=aud.name;
    if(isOn){pill.style.background=c.bg;pill.style.color=c.text;pill.style.borderColor=c.dot;}
    else{pill.style.background='#fff';pill.style.color='#555';pill.style.borderColor='#ddd';}
    pill.addEventListener('click',()=>{selAudienceId=aud.id;refreshAudPills();});
    container.appendChild(pill);
  });
}

function allThemes(){const s=new Set();Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name)s.add(e.name)}));return[...s].sort();}
function isActive(ev){
  const co=filterCh.size===0||(ev.channelId&&filterCh.has(ev.channelId));
  const to=filterTh.size===0||filterTh.has(ev.name);
  const ao=filterAud.size===0||(ev.audienceId&&filterAud.has(ev.audienceId));
  return co&&to&&ao;
}

function renderFilterBar(){
  function makeChips(containerId,items,filterSet,getId,getLabel,getDot){
    const fc=document.getElementById(containerId);fc.innerHTML='';
    const ac=document.createElement('div');ac.className='fchip'+(filterSet.size===0?' active-all':'');ac.textContent='Todos';
    ac.addEventListener('click',()=>{filterSet.clear();renderFilterBar();renderCal();});fc.appendChild(ac);
    items.forEach(item=>{
      const id=getId(item),label=getLabel(item),dot=getDot(item);
      const c=gc(dot);const isOn=filterSet.has(id);
      const chip=document.createElement('div');chip.className='fchip'+(isOn?' active':'');
      if(isOn){chip.style.background=c.bg;chip.style.color=c.text;chip.style.borderColor=c.dot;}
      chip.innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c.dot};margin-right:4px;vertical-align:middle"></span>${label}`;
      chip.addEventListener('click',()=>{isOn?filterSet.delete(id):filterSet.add(id);renderFilterBar();renderCal();});
      fc.appendChild(chip);
    });
  }
  makeChips('filter-channels',channels,filterCh,ch=>ch.id,ch=>ch.name,ch=>ch.color);
  makeChips('filter-audiences',audiences,filterAud,a=>a.id,a=>a.name,a=>a.color);

  const ft=document.getElementById('filter-themes');ft.innerHTML='';
  const themes=allThemes();
  if(!themes.length){ft.innerHTML='<span style="font-size:11px;color:#aaa">Nenhum tema ainda</span>';}
  else{
    const at=document.createElement('div');at.className='fchip'+(filterTh.size===0?' active-all':'');at.textContent='Todos';
    at.addEventListener('click',()=>{filterTh.clear();renderFilterBar();renderCal();});ft.appendChild(at);
    themes.forEach(name=>{
      let color='gray';Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name===name)color=e.color;}));
      const c=gc(color),isOn=filterTh.has(name);
      const chip=document.createElement('div');chip.className='fchip'+(isOn?' active':'');
      if(isOn){chip.style.background=c.bg;chip.style.color=c.text;chip.style.borderColor=c.dot;}
      chip.textContent=name;
      chip.addEventListener('click',()=>{isOn?filterTh.delete(name):filterTh.add(name);renderFilterBar();renderCal();});
      ft.appendChild(chip);
    });
  }
  const parts=[];
  if(filterCh.size>0)parts.push('Canal: '+[...filterCh].map(id=>channels.find(c=>c.id===id)?.name||id).join(', '));
  if(filterAud.size>0)parts.push('Público: '+[...filterAud].map(id=>audiences.find(a=>a.id===id)?.name||id).join(', '));
  if(filterTh.size>0)parts.push('Tema: '+[...filterTh].join(', '));
  document.getElementById('active-filters-row').textContent=parts.length?'Filtros ativos — '+parts.join(' · '):'';
}

function renderCampList(){
  const el=document.getElementById('camp-list');el.innerHTML='';
  if(!campaigns.length){el.innerHTML='<div style="font-size:12px;color:#aaa">Nenhuma campanha. Adicione abaixo.</div>';return;}
  campaigns.forEach(cp=>{
    const c=gc(cp.color),row=document.createElement('div');row.className='camp-list-row';
    const dot=document.createElement('div');dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${c.dot};flex-shrink:0`;
    const name=document.createElement('span');name.style.cssText='flex:1;font-size:13px;color:#1a1a1a';name.textContent=cp.name;
    const dates=document.createElement('span');dates.style.cssText='font-size:11px;color:#aaa';dates.textContent=`${cp.start}→${cp.end}`;
    const editBtn=document.createElement('button');editBtn.textContent='✏️';editBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:12px;padding:0 4px';
    const delBtn=document.createElement('button');delBtn.textContent='✕';delBtn.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;padding:0';
    editBtn.addEventListener('click',e=>{e.stopPropagation();startEditCamp(cp.id);});
    delBtn.addEventListener('click',e=>{e.stopPropagation();campaigns=campaigns.filter(x=>x.id!==cp.id);saveConfig();renderCampList();renderCal();});
    row.appendChild(dot);row.appendChild(name);row.appendChild(dates);row.appendChild(editBtn);row.appendChild(delBtn);
    el.appendChild(row);
  });
}
function startEditCamp(id){
  const cp=campaigns.find(x=>x.id===id);if(!cp)return;
  editCampId=id;
  document.getElementById('camp-name').value=cp.name;
  document.getElementById('camp-start').value=cp.start;
  document.getElementById('camp-end').value=cp.end;
  selCampColor=cp.color;buildGrid('camp-color-grid',selCampColor,id=>{selCampColor=id;});
  document.getElementById('edit-camp-badge').style.display='inline-block';
  document.getElementById('camp-add').textContent='Salvar alterações';
}
document.getElementById('camp-add').addEventListener('click',()=>{
  const name=document.getElementById('camp-name').value.trim();
  const start=document.getElementById('camp-start').value,end=document.getElementById('camp-end').value;
  if(!name||!start||!end||start>end)return;
  if(editCampId){
    const idx=campaigns.findIndex(x=>x.id===editCampId);
    if(idx>-1)campaigns[idx]={...campaigns[idx],name,start,end,color:selCampColor};
    editCampId=null;document.getElementById('edit-camp-badge').style.display='none';document.getElementById('camp-add').textContent='Adicionar campanha';
  }else{campaigns.push({id:'cp_'+Date.now(),name,start,end,color:selCampColor});}
  document.getElementById('camp-name').value='';
  saveConfig();renderCampList();renderCal();
});

function renderChList(){
  const el=document.getElementById('channel-list');el.innerHTML='';
  channels.forEach(ch=>{
    const c=gc(ch.color),row=document.createElement('div');row.className='list-row';
    const dot=document.createElement('div');dot.className='dot-sm';dot.style.background=c.dot;
    const name=document.createElement('span');name.style.cssText='flex:1;font-size:13px;color:#1a1a1a';name.textContent=ch.name;
    const delBtn=document.createElement('button');delBtn.textContent='✕';delBtn.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;font-size:13px';
    delBtn.addEventListener('click',()=>{channels=channels.filter(x=>x.id!==ch.id);saveConfig();renderChList();refreshChSel();renderCal();});
    row.appendChild(dot);row.appendChild(name);row.appendChild(delBtn);el.appendChild(row);
  });
}
document.getElementById('ch-add').addEventListener('click',()=>{
  const name=document.getElementById('new-ch-name').value.trim();if(!name)return;
  channels.push({id:'ch_'+Date.now(),name,color:selChColor});
  document.getElementById('new-ch-name').value='';
  saveConfig();renderChList();refreshChSel();renderFilterBar();renderCal();
});

function renderAudList(){
  const el=document.getElementById('audience-list');el.innerHTML='';
  audiences.forEach(aud=>{
    const c=gc(aud.color),row=document.createElement('div');row.className='list-row';
    const dot=document.createElement('div');dot.className='dot-sm';dot.style.background=c.dot;
    const name=document.createElement('span');name.style.cssText='flex:1;font-size:13px;color:#1a1a1a';name.textContent=aud.name;
    const delBtn=document.createElement('button');delBtn.textContent='✕';delBtn.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;font-size:13px';
    if(aud.id==='aud_todos'){delBtn.disabled=true;delBtn.style.opacity='.3';delBtn.style.cursor='default';}
    else delBtn.addEventListener('click',()=>{audiences=audiences.filter(x=>x.id!==aud.id);saveConfig();renderAudList();refreshAudPills();renderFilterBar();renderCal();});
    row.appendChild(dot);row.appendChild(name);row.appendChild(delBtn);el.appendChild(row);
  });
}
document.getElementById('aud-add').addEventListener('click',()=>{
  const name=document.getElementById('new-aud-name').value.trim();if(!name)return;
  audiences.push({id:'aud_'+Date.now(),name,color:selAudColor});
  document.getElementById('new-aud-name').value='';
  saveConfig();renderAudList();refreshAudPills();renderFilterBar();renderCal();
});

function usedThemes(){const t={};Object.values(events).forEach(arr=>arr.forEach(e=>{if(e.name)t[e.name]=e.color}));return t;}

function renderLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  channels.forEach(ch=>{const c=gc(ch.color);el.innerHTML+=`<div class="legend-item"><div class="ldot" style="background:${c.dot}"></div><span>${ch.name}</span></div>`;});
  el.innerHTML+=`<span style="font-size:11px;color:#ccc;margin:0 6px">|</span>`;
  audiences.forEach(aud=>{const c=gc(aud.color);el.innerHTML+=`<div class="legend-item"><div class="ldot" style="background:${c.dot}"></div><span style="font-style:italic">${aud.name}</span></div>`;});
  if(campaigns.length){
    el.innerHTML+=`<span style="font-size:11px;color:#ccc;margin:0 6px">|</span>`;
    campaigns.forEach(cp=>{const c=gc(cp.color);el.innerHTML+=`<div class="legend-item"><div class="ldot-sq" style="background:${c.dot}"></div><span>${cp.name}</span></div>`;});
  }
}

function dkey(y,m,d){return y+'-'+(m+1)+'-'+d}
function dateFromKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function campsForDay(k){
  const d=dateFromKey(k);
  return campaigns.filter(cp=>{const s=parseDate(cp.start),e=parseDate(cp.end);return d>=s&&d<=e;});
}

function renderCal(){
  const body=document.getElementById('cal-body');
  document.getElementById('month-label').textContent=MONTHS[cur.m]+' '+cur.y;
  body.innerHTML='';

  const first=new Date(cur.y,cur.m,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const total=new Date(cur.y,cur.m+1,0).getDate();
  const prevTotal=new Date(cur.y,cur.m,0).getDate();

  // build full flat list of cells
  const cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:prevTotal-i,cur:false});
  for(let d=1;d<=total;d++)cells.push({d,cur:true});
  let nxt=1;while(cells.length%7!==0)cells.push({d:nxt++,cur:false});

  // split into weeks
  for(let w=0;w<cells.length/7;w++){
    const week=cells.slice(w*7,(w+1)*7);
    const weekRow=document.createElement('div');weekRow.className='cal-week';

    // pre-compute which campaigns are active this week and how many layers
    // map campId -> layer index for the week
    const weekKeys=week.map(({d,cur:isCur},i)=>isCur?dkey(cur.y,cur.m,d):null);
    // unique campaigns active in this week, in order
    const weekCamps=[];
    weekKeys.forEach(k=>{if(!k)return;campsForDay(k).forEach(cp=>{if(!weekCamps.find(x=>x.id===cp.id))weekCamps.push(cp);});});

    week.forEach(({d,cur:isCur},colIdx)=>{
      const cell=document.createElement('div');
      cell.className='day-cell'+(isCur?'':' other-month');
      const k=isCur?dkey(cur.y,cur.m,d):null;
      const isToday=isCur&&d===today.getDate()&&cur.m===today.getMonth()&&cur.y===today.getFullYear();
      if(isToday)cell.classList.add('today');

      const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=d;cell.appendChild(numEl);

      // events
      const evArea=document.createElement('div');evArea.className='events-area';
      if(isCur&&events[k]){
        events[k].forEach((ev,i)=>{
          const c=gc(ev.color);
          const ch=channels.find(x=>x.id===ev.channelId);
          const aud=audiences.find(x=>x.id===ev.audienceId);
          const dimmed=(filterCh.size>0||filterTh.size>0||filterAud.size>0)&&!isActive(ev);
          const chip=document.createElement('div');chip.className='event-chip'+(dimmed?' dimmed':'');
          chip.style.background=c.bg;chip.style.color=c.text;
          const audDot=aud?`<span class="chip-aud-dot" style="background:${gc(aud.color).dot}" title="${aud.name}"></span>`:'';
          const chName=ch?`<span>${ch.name}</span>`:'';
          chip.innerHTML=`<span class="chip-text">${ev.time}·${ev.name}</span><span class="chip-meta">${audDot}${chName}</span><span class="chip-del" title="Remover">✕</span>`;
          chip.addEventListener('click',e=>{if(e.target.classList.contains('chip-del'))return;e.stopPropagation();openEditEvent(k,i);});
          chip.querySelector('.chip-del').addEventListener('click',e=>{e.stopPropagation();events[k].splice(i,1);if(!events[k].length)delete events[k];saveEvents();renderCal();renderFilterBar();});
          evArea.appendChild(chip);
        });
      }
      cell.appendChild(evArea);

      // campaigns area — one bar slot per campaign in weekCamps (placeholder if not active)
      if(isCur){
        const campArea=document.createElement('div');campArea.className='campaigns-area';
        weekCamps.forEach(cp=>{
          const active=k?campsForDay(k).find(x=>x.id===cp.id):null;
          if(!active){
            // placeholder to keep alignment
            const ph=document.createElement('div');ph.className='camp-bar placeholder';ph.textContent='\u00A0';campArea.appendChild(ph);
            return;
          }
          const c=gc(cp.color);
          const s=parseDate(cp.start),e=parseDate(cp.end),cellDate=dateFromKey(k);
          const isStart=cellDate.getTime()===s.getTime(),isEnd=cellDate.getTime()===e.getTime();
          const isSolo=isStart&&isEnd,isMonStart=colIdx===0,isMonEnd=colIdx===6;
          let cls='camp-bar ';
          if(isSolo)cls+='solo';
          else if(isStart||isMonStart)cls+=(isEnd||isMonEnd)?'solo':'start';
          else if(isEnd||isMonEnd)cls+='end';
          else cls+='middle';
          const bar=document.createElement('div');bar.className=cls;bar.style.background=c.dot;
          const showText=isStart||isMonStart;
          bar.innerHTML=showText?`${cp.name}<span class="bar-del">✕</span>`:`<span class="bar-del">✕</span>`;
          bar.addEventListener('click',e=>{
            if(e.target.classList.contains('bar-del')){e.stopPropagation();campaigns=campaigns.filter(x=>x.id!==cp.id);saveConfig();renderCal();return;}
            e.stopPropagation();openCell=k;document.getElementById('modal-bg').style.display='flex';switchTab('campaign');setTimeout(()=>startEditCamp(cp.id),50);
          });
          campArea.appendChild(bar);
        });
        cell.appendChild(campArea);

        const btn=document.createElement('button');btn.className='add-btn';btn.textContent='+';
        btn.addEventListener('click',e=>{e.stopPropagation();openModal(k,d);});
        cell.appendChild(btn);
        cell.addEventListener('click',()=>openModal(k,d));
      }
      weekRow.appendChild(cell);
    });
    body.appendChild(weekRow);
  }
  renderLegend();renderFilterBar();
}

function openModal(k,d){
  openCell=k;editEvKey=null;editEvIdx=null;
  document.getElementById('edit-badge').style.display='none';
  document.getElementById('modal-save').textContent='Salvar';
  document.getElementById('modal-title').textContent='Disparo — dia '+d;
  document.getElementById('ev-name').value='';document.getElementById('ev-hour').value='09';document.getElementById('ev-min').value='00';
  selColor='purple';selAudienceId='aud_todos';
  refreshChSel();refreshAudPills();buildGrid('color-grid',selColor,id=>{selColor=id;});
  const sug=document.getElementById('theme-suggestions');sug.innerHTML='';
  Object.entries(usedThemes()).forEach(([name,color])=>{
    const c=gc(color),tag=document.createElement('div');tag.className='theme-tag';tag.textContent=name;
    tag.style.background=c.bg;tag.style.color=c.text;tag.style.borderColor=c.dot;
    tag.addEventListener('click',()=>{document.getElementById('ev-name').value=name;selColor=color;buildGrid('color-grid',selColor,id=>{selColor=id;});});
    sug.appendChild(tag);
  });
  switchTab('event');document.getElementById('modal-bg').style.display='flex';
  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}

function openEditEvent(k,i){
  const ev=events[k]&&events[k][i];if(!ev)return;
  editEvKey=k;editEvIdx=i;openCell=k;
  const[h,m]=(ev.time||'09:00').split(':');
  document.getElementById('ev-hour').value=h||'09';document.getElementById('ev-min').value=(m==='30'?'30':'00');
  document.getElementById('ev-name').value=ev.name||'';
  selColor=ev.color||'purple';selAudienceId=ev.audienceId||'aud_todos';
  refreshChSel();document.getElementById('ev-channel').value=ev.channelId||'';updChColor();
  buildGrid('color-grid',selColor,id=>{selColor=id;});refreshAudPills();
  document.getElementById('edit-badge').style.display='inline-block';
  document.getElementById('modal-title').textContent='Editar disparo';document.getElementById('modal-save').textContent='Salvar alterações';
  const sug=document.getElementById('theme-suggestions');sug.innerHTML='';
  Object.entries(usedThemes()).forEach(([name,color])=>{
    const c=gc(color),tag=document.createElement('div');tag.className='theme-tag';tag.textContent=name;
    tag.style.background=c.bg;tag.style.color=c.text;tag.style.borderColor=c.dot;
    tag.addEventListener('click',()=>{document.getElementById('ev-name').value=name;selColor=color;buildGrid('color-grid',selColor,id=>{selColor=id;});});
    sug.appendChild(tag);
  });
  switchTab('event');document.getElementById('modal-bg').style.display='flex';
  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}

document.getElementById('modal-save').addEventListener('click',()=>{
  const name=document.getElementById('ev-name').value.trim();
  const h=document.getElementById('ev-hour').value,m=document.getElementById('ev-min').value,time=h+':'+m;
  const channelId=document.getElementById('ev-channel').value||null,audienceId=selAudienceId||null;
  if(!name)return;
  if(editEvKey!==null&&editEvIdx!==null){events[editEvKey][editEvIdx]={name,time,color:selColor,channelId,audienceId};events[editEvKey].sort((a,b)=>a.time.localeCompare(b.time));}
  else{if(!events[openCell])events[openCell]=[];events[openCell].push({name,time,color:selColor,channelId,audienceId});events[openCell].sort((a,b)=>a.time.localeCompare(b.time));}
  saveEvents();renderCal();renderFilterBar();document.getElementById('modal-bg').style.display='none';
});

['modal-cancel','camp-cancel','ch-cancel','aud-cancel'].forEach(id=>document.getElementById(id).addEventListener('click',()=>{document.getElementById('modal-bg').style.display='none';}));
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('modal-bg').style.display='none';});
document.getElementById('ev-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-save').click();});
document.getElementById('new-ch-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ch-add').click();});
document.getElementById('new-aud-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('aud-add').click();});
document.getElementById('camp-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('camp-add').click();});
document.getElementById('prev').addEventListener('click',()=>{cur.m--;if(cur.m<0){cur.m=11;cur.y--;}renderCal();});
document.getElementById('next').addEventListener('click',()=>{cur.m++;if(cur.m>11){cur.m=0;cur.y++;}renderCal();});

const pad=n=>String(n).padStart(2,'0');
document.getElementById('camp-start').value=`${cur.y}-${pad(cur.m+1)}-01`;
document.getElementById('camp-end').value=`${cur.y}-${pad(cur.m+1)}-${new Date(cur.y,cur.m+1,0).getDate()}`;

await loadFromFirebase();
startListener();
</script>
